<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>「秘法之匯」魔法道具商店</title>
    <style>
        :root {
            --primary: #5e1f75;
            --secondary: #dfc2f2;
            --bg: #f9f6f0;
            --text: #2a2a2a;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--secondary); padding-bottom: 15px; }
        .filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 20px; background: var(--secondary); color: var(--primary); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover, button.active { background: var(--primary); color: #fff; }
        input[type="text"] { padding: 10px; width: 300px; border: 2px solid var(--secondary); border-radius: 5px; }
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .item-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #fafafa; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-size: 1.2em; font-weight: bold; color: var(--primary); }
        .item-type { font-size: 0.85em; color: #666; background: var(--secondary); display: inline-block; padding: 3px 8px; border-radius: 3px; margin-bottom: 10px; width: fit-content; }
        .item-desc { flex-grow: 1; margin-bottom: 10px; font-size: 0.95em; }
        .item-price { font-size: 1.2em; color: #c94a29; font-weight: bold; text-align: right; margin-bottom: 10px; }
        .buy-btn { background: #5a9e32; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .buy-btn:hover { background: #457825; }
        #cart-count { font-size: 1.1em; font-weight: bold; color: var(--primary); text-align: right; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 「秘法之匯」魔法道具商店 ✨</h1>
        
        <div id="cart-count">購物車：0 件商品</div>

        <div class="filters">
            <button class="active" onclick="filterItems('all')">顯示全部</button>
            <button onclick="filterItems('冒險者用品')">冒險者用品 (100)</button>
            <button onclick="filterItems('常見道具')">常見道具 (50)</button>
            <button onclick="filterItems('非常見道具')">非常見道具 (20)</button>
            <button onclick="filterItems('稀有道具')">稀有道具 (5)</button>
            <input type="text" id="searchInput" onkeyup="searchItems()" placeholder="搜尋道具名稱或能力...">
        </div>

        <div class="item-grid" id="shopItems">
            <!-- 道具列表將由 JavaScript 生成 -->
        </div>
    </div>

    <script>
        const items = [
            // 冒險者用品 (範例 5 項，可擴充至 100 項)
            { name: "回音石", type: "冒險者用品", desc: "記錄一句長達一分鐘的聲音，捏碎後可將聲音向指定方向放大重播。", price: "15 GP" },
            { name: "夜視油", type: "冒險者用品", desc: "塗抹於眼皮上，在完全黑暗中提供60呎的黑暗視覺，持續1小時。", price: "25 GP" },
            { name: "急救藤蔓種子", type: "冒險者用品", desc: "接觸土壤後瞬間生長，可纏繞包紮傷口，穩固受傷隊友，使其脫離瀕死。", price: "50 GP" },
            { name: "萬能溶解劑", type: "冒險者用品", desc: "僅需一滴即可溶解大多數魔法或非魔法的黏著劑。", price: "30 GP" },
            { name: "微風帳篷", type: "冒險者用品", desc: "展開後自動搭建，內部環境恆溫、防雨、防蚊蟲，可容納兩人。", price: "120 GP" },
            // 常見道具 (範例 5 項，可擴充至 50 項)
            { name: "輕羽斗篷", type: "常見道具", desc: "穿戴者在墜落時必定會觸發羽落術，落地時不受傷害。", price: "250 GP" },
            { name: "永燃火把", type: "常見道具", desc: "不會熄滅的火把，散發明亮光芒，可用命令語開關。", price: "100 GP" },
            { name: "尋路羅盤", type: "常見道具", desc: "指針永遠指向隊伍設定的目標（如特定的城鎮或任務地點）。", price: "400 GP" },
            { name: "水行之戒", type: "常見道具", desc: "佩戴者可在水下呼吸，且游泳速度等於基礎移動速度。", price: "600 GP" },
            { name: "儲能魔杖", type: "常見道具", desc: "可由施法者注入一個1環法術，非施法者亦可憑意志釋放該法術一次。", price: "800 GP" },
            // 非常見道具 (範例 5 項，可擴充至 20 項)
            { name: "閃現短劍", type: "非常見道具", desc: "每日一次，投擲後可瞬間傳送至短劍落地的位置。", price: "2500 GP" },
            { name: "隱形戒指", type: "非常見道具", desc: "佩戴後進入隱形狀態，但在攻擊或施法後隱形會解除。", price: "6000 GP" },
            { name: "治療之泉墜飾", type: "非常見道具", desc: "每日可釋放一次強效治療術，恢復 4d8+4 的生命值。", price: "4500 GP" },
            { name: "火舌長劍", type: "非常見道具", desc: "附魔武器，命中時額外造成 1d6 火焰傷害，能照亮周圍。", price: "3500 GP" },
            { name: "巧手之手", type: "非常見道具", desc: "一隻幽靈般的手，可代為開鎖、偷竊或遠距離拿取物品。", price: "2000 GP" },
            // 稀有道具 (5項)
            { name: "飛行掃帚", type: "稀有道具", desc: "騎乘者能以時速50英里飛行，無視地形障礙。", price: "25000 GP" },
            { name: "時間停止沙漏", type: "稀有道具", desc: "捏碎後獲得一次額外的完整回合，在此期間時間對其他人靜止。", price: "60000 GP" },
            { name: "傳送石板", type: "稀有道具", desc: "一組兩塊，不論距離多遠，只要將信件或物品放在石板上即可瞬間傳送給另一塊板子。", price: "40000 GP" },
            { name: "復活十字架", type: "稀有道具", desc: "在持有者死亡時自動觸發，使其滿血復活並解除所有負面狀態，一次性消耗品。", price: "95000 GP" },
            { name: "元素防護鎧甲", type: "稀有道具", desc: "免疫所有非魔法的火焰、冰凍、閃電與酸液傷害。", price: "80000 GP" }
        ];

        let cartCount = 0;

        function displayItems(itemsToDisplay) {
            const grid = document.getElementById('shopItems');
            grid.innerHTML = '';
            
            itemsToDisplay.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.setAttribute('data-name', item.name.toLowerCase());
                card.setAttribute('data-desc', item.desc.toLowerCase());
                card.setAttribute('data-type', item.type);
                
                card.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="item-type">${item.type}</div>
                    <div class="item-desc">${item.desc}</div>
                    <div class="item-price">${item.price}</div>
                    <button class="buy-btn" onclick="addToCart('${item.name}')">加入購物車</button>
                `;
                grid.appendChild(card);
            });
        }

        function filterItems(type) {
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (type === 'all') {
                displayItems(items);
            } else {
                const filtered = items.filter(item => item.type === type);
                displayItems(filtered);
            }
        }

        function searchItems() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.item-card');
            
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const desc = card.getAttribute('data-desc');
                if (name.includes(input) || desc.includes(input)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function addToCart(itemName) {
            cartCount++;
            document.getElementById('cart-count').innerText = `購物車：${cartCount} 件商品`;
            alert(`已將 ${itemName} 放入魔法包！`);
        }

        // 初始載入
        displayItems(items);
    </script>
</body>
</html>
